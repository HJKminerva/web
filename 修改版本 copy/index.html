<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击图标显示模态框</title>
    <style>
        /* 模态框的样式 */
        .modal {
            display: none; /* 初始时隐藏 */
            position: fixed;
            z-index: 1; /* 置于顶部 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto; /* 允许滚动 */
            background-color: rgb(0,0,0); /* 背景颜色 */
            background-color: rgba(0,0,0,0.4); /* 背景颜色的透明度 */
        }

        /* 模态框内容 */
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; /* 15% 从顶部开始居中 */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* 宽度 */
        }

        /* 关闭按钮 */
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- 图标 -->
<img id="myIcon" src="../修改版本 copy/image/image.png" alt="图标" style="width:50px;cursor:pointer;">

<!-- 模态框 -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <p>这是一个模态框。</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
