<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>搜索框示例</title>
</head>
<body>

<div class="np-autocomplete searchPage np-tooltip__trigger" role="combobox" aria-haspopup="listbox"
    aria-expanded="false" aria-owns="np-id-3069-2" aria-controls="np-id-3069-1">
    <div class="np-input np-input--large np-input--suffix">
        <div class="np-input__wrapper" tabindex="-1">
            <input class="np-input__inner" type="text" autocomplete="off" tabindex="0" placeholder="功能号搜索"
                role="textbox" aria-autocomplete="list" aria-controls="id" aria-activedescendant="np-id-3069-2-item--1"
                id="np-id-3069-7">
            <span class="np-input__suffix">
                <span class="np-input__suffix-inner">
                    <img src="../company/assets/search_icon.svg" alt="搜索图标" class="search-icon">
                </span>
            </span>
        </div>
    </div>
</div>

</body>
</html>
