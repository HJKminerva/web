<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型示例</title>
    <style>
        .box {
            width: 200px; /* 内容宽度 */
            height: 100px; /* 内容高度 */
            padding: 20px; /* 内边距 */
            border: 5px solid #000; /* 边框 */
            margin: 15px; /* 外边距 */
            background-color: #f0f0f0; /* 背景颜色 */
        }
    </style>
</head>
<body>
    <div class="box">盒子模型示例</div>
</body>
</html>
